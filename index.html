<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing - Cafetín</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            min-height: 60vh;
        }
    </style>
</head>
<body>
<div class="container py-5">
        <div class="text-center mb-5 hero d-flex flex-column justify-content-center align-items-center">
            <h1 class="display-5 fw-bold">Bienvenido al Cafetín</h1>
        </div>
        <div class="row gy-4">
            <div class="col-lg-6">
                <div class="shadow-sm h-100">
                    <div class="d-flex flex-column justify-content-between">
                        <a href="./cliente.html" class="btn btn-secondary btn-lg mt-3">cliente</a>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="shadow-sm h-100">
                    <div class="d-flex flex-column justify-content-between">
                        <button href="./admin.html" class="btn btn-primary btn-lg mt-3" data-bs-toggle="modal" data-bs-target="#adminLoginForm">
                           admin
                        </button>
                        <div class="modal fade" id="adminLoginForm" tabindex="-1" aria-labelledby="adminLoginFormLabel" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title" id="adminLoginFormLabel">Administrador</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form id="adminLoginForm">
                                            <div class="mb-3">
                                                <label for="adminUsuario" class="form-label">Usuario</label>
                                                <input type="text" class="form-control" id="adminUsuario" required>
                                            </div>
                                            <div class="mb-3">
                                                <label for="adminContrasena" class="form-label">Contraseña</label>
                                                <input type="password" class="form-control" id="adminContrasena" required>
                                            </div>
                                            <button type="submit" class="btn btn-primary">Ingresar</button>
                                        </form>
                                    </div>
                                </div>
                                <div id="landingAlert"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    const form = document.getElementById('adminLoginForm');
        const alertContainer = document.getElementById('landingAlert');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const usuario = document.getElementById('adminUsuario').value.trim();
            const contrasena = document.getElementById('adminContrasena').value.trim();
            alertContainer.innerHTML = '';

            if (usuario === 'admin' && contrasena === 'admin') {
                window.location.href = 'admin.html';
                return;
            }

            alertContainer.innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    Usuario o contraseña incorrectos
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
            `;
        });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
