<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetín - Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background:#f8f9fa;
        }
        .product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Cafetín - Cliente</h1>
        <button class="btn btn-outline-secondary" onclick="location.href='admin.html'">Panel Administrativo</button>
    </div>
    <div id="clienteAlertContainer"></div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white fw-bold">Nuestros Productos</div>
                <div class="card-body">
                    <div class="row g-3 mb-4 align-items-center">
                        <div class="col-md-8">
                                <input type="text" id="inBuscarProductoCliente" class="form-control" placeholder="Filtrar por nombre de producto">
                        </div>
                        <div class="col-md-4">
                                <select id="selectCategoria" class="form-select">
                                    <option value="Todas">Todas las categorías</option>
                                    <option value="Comidas">Comidas</option>
                                    <option value="Bebidas">Bebidas</option>
                                    <option value="Snacks">Snacks</option>
                                    <option value="Postres">Postres</option>
                                </select>
                        </div>
                    </div>
                    <div class="row" id="listaProductos"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white fw-bold">Tu pedido</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Cédula del cliente</label>
                        <input type="text" id="inCedulaCliente" class="form-control" placeholder="Cédula" minlength="7" maxlength="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre del cliente</label>
                        <input type="text" id="inNomCliente" class="form-control" placeholder="Tu nombre">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead><tr><th>Producto</th><th>Cantidad</th><th>Subtotal</th><th></th></thead>
                            <tbody id="tablaCarrito"></tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Total:</span>
                        <span id="spTotalPedido">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between text-muted">
                        <span>Total Bs.:</span>
                        <span id="spTotalPedidoBs">Bs. 0.00</span>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Forma de pago</div>
                <div class="card-body">
                    <select id="metodoPago" class="form-select mb-3">
                        <option value="">Seleccione</option>
                        <option value="Efectivo USD">Efectivo USD</option>
                        <option value="Efectivo Bs.">Efectivo Bs.</option>
                        <option value="Pago Móvil">Pago Móvil</option>
                        <option value="Otro">Otro</option>
                    </select>
                    <div id="divPagoMovil" style="display:none">
                        <label class="form-label">Referencia / Nro. Teléfono</label>
                        <input type="text" id="refPagoMovil" class="form-control mb-2" minlength="4" maxlength="11">
                    </div>
                    <div id="divOtro" style="display:none">
                        <label class="form-label">Descripción</label>
                        <input type="text" id="descOtro" class="form-control mb-2">
                    </div>
                    <div id="divEfectivo" style="display:none">
                        <label class="form-label">Monto entregado</label>
                        <input type="number" id="montoEfectivo" class="form-control mb-2" min="0" step="0.01">
                    </div>
                    <div id="divEfectivoUSD" style="display:none">
                        <label class="form-label">Monto entregado (USD)</label>
                        <input type="number" id="montoEfectivoUSD" class="form-control mb-2" min="0" step="0.01">
                    </div>
                    <button id="btEnviar" class="btn btn-success w-100">Enviar pedido</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module">
    import Cl_cCliente from "./dist/controllers/Cl_cCliente.js";
    import Cl_vCliente from "./dist/views/Cl_vCliente.js";
    const vista = new Cl_vCliente();
    new Cl_cCliente(vista);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
