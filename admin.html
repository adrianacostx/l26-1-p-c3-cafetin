<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetín - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Panel de Administración</h1>
        <button class="btn btn-outline-secondary" onclick="location.href='index.html'">Ir a Cliente</button>
    </div>

    <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pedidos">Pedidos</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#productos">Productos</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="pedidos">
            <div class="card shadow-sm mb-4">
                <div class="card-body row g-3">
                    <div class="col-md-3">
                        <label>Filtrar por estado</label>
                        <select id="inFiltroEstado" class="form-select">
                            <option value="Todos">Todos</option>
                            <option value="Pendiente">Pendientes</option>
                            <option value="Procesado">Procesados</option>
                            <option value="Cancelado">Cancelados</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Filtrar por pago</label>
                        <select id="inFiltroMetodoPago" class="form-select">
                            <option value="Todos">Todos</option>
                            <option value="Efectivo USD">Efectivo USD</option>
                            <option value="Efectivo Bs.">Efectivo Bs.</option>
                            <option value="Pago Móvil">Pago Móvil</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Filtrar por fecha</label>
                        <input type="date" id="inFiltroFecha" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Filtrar por producto</label>
                        <select id="inFiltroProducto" class="form-select">
                            <option value="Todos">Todos</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm mb-4">
                <div class="card-body row g-3 align-items-end">
                    <div class="col-md-3">
                        <label>Cédula del cliente</label>
                        <input type="text" id="inCedulaBuscar" class="form-control" placeholder="Ej. V12345678">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button id="btnBuscarCedula" class="btn btn-primary">Buscar</button>
                    </div>
                    <div class="col-md-4">
                        <label>Total pagado por cliente</label>
                        <div id="spTotalPagadoCliente" class="form-control-plaintext fs-5 fw-bold">$ 0.00</div>
                    </div>
                    <div class="col-md-3">
                        <label>Total ingresado en Efectivo Bs.</label>
                        <div id="spTotalEfectivoBs" class="form-control-plaintext fs-5 fw-bold">Bs. 0.00</div>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>ID</th>
                                <th>Cliente</th>
                                <th>Cédula</th>
                                <th>Productos</th>
                                <th>Cantidad</th>
                                <th>Total</th>
                                <th>Método pago</th>
                                <th>Monto entregado</th>
                                <th>Detalle</th>
                                <th>Fecha</th>
                                <th>Estado</th>
                                <th>Acción</th></thead>
                        <tbody id="tablaPedidos"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="productos">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Gestión de productos</h5>
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label for="inBuscarProducto" class="form-label">Buscar producto por nombre</label>
                            <input type="text" id="inBuscarProducto" class="form-control" placeholder="Escribe el nombre del producto">
                        </div>
                    </div>
                    <form id="formProducto" class="row g-3">
                        <div class="col-md-3">
                            <label>Código</label>
                            <input type="text" id="prodCodigo" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label>Nombre</label>
                            <input type="text" id="prodNombre" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label>Categoría</label>
                            <input type="text" id="prodCategoria" class="form-control" required>
                        </div>
                        <div class="col-md-2">
                            <label>Precio ($)</label>
                            <input type="number" step="0.01" id="prodPrecio" class="form-control" required>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" id="btnGuardarProducto" class="btn btn-primary w-100">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-sm align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Solicitudes</th>
                                <th>% total de pedidos</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="adminAlertModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Aviso</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="adminAlertModalBody"></div>
        </div>
    </div>
</div>
<div class="modal fade" id="adminConfirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar disponibilidad del producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="adminConfirmModalBody"></div>
            <div class="modal-footer justify-content-start">
                <button type="button" class="btn btn-danger mb-3" id="adminConfirmDeleteBtn">Eliminar</button>
                <button type="button" class="btn btn-warning mb-3" id="adminConfirmDisableBtn">No disponible</button>
                <button type="button" class="btn btn-success mb-3" id="adminConfirmEnableBtn">Disponible</button>
                <button type="button" class="btn btn-secondary mb-3" data-bs-dismiss="modal">Cancelar</button>
            </div>
        </div>
    </div>
</div>
<script type="module">
    import Cl_cAdmin from "./dist/controllers/Cl_cAdmin.js";
    import Cl_vAdmin from "./dist/views/Cl_vAdmin.js";
    const vista = new Cl_vAdmin();
    new Cl_cAdmin(vista);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
